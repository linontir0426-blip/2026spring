<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aesthetic Mood Tracker</title>
    <style>
        :root {
            --bg-color: #f0f4f8;
            --card-bg: #ffffff;
            --text-main: #334e68;
            --primary: #9ba3eb;
            --happy: #fef3c7;
            --neutral: #e2e8f0;
            --sad: #dbeafe;
            --angry: #fee2e2;
            --shadow: 0 10px 25px rgba(0,0,0,0.05);
            --transition: all 0.3s ease;
        }

        [data-theme="dark"] {
            --bg-color: #102a43;
            --card-bg: #243b53;
            --text-main: #f0f4f8;
            --border: #486581;
            --shadow: 0 10px 25px rgba(0,0,0,0.3);
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            transition: var(--transition);
        }

        .app-container {
            width: 100%;
            max-width: 900px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        @media (max-width: 768px) { .app-container { grid-template-columns: 1fr; } }

        .card {
            background: var(--card-bg);
            padding: 25px;
            border-radius: 20px;
            box-shadow: var(--shadow);
            margin-bottom: 20px;
        }

        h1, h2 { margin-top: 0; color: var(--primary); }

        /* --- Mood Input Section --- */
        .mood-grid {
            display: flex;
            justify-content: space-around;
            margin: 20px 0;
        }

        .mood-btn {
            font-size: 2rem;
            background: var(--bg-color);
            border: 2px solid transparent;
            border-radius: 15px;
            padding: 10px;
            cursor: pointer;
            transition: var(--transition);
        }

        .mood-btn:hover { transform: scale(1.1); }
        .mood-btn.selected { border-color: var(--primary); transform: scale(1.15); }

        textarea {
            width: 100%;
            height: 80px;
            padding: 12px;
            border-radius: 12px;
            border: 1px solid #ccc;
            background: var(--bg-color);
            color: var(--text-main);
            resize: none;
            box-sizing: border-box;
            margin-bottom: 15px;
        }

        .save-btn {
            width: 100%;
            padding: 12px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
        }

        /* --- Calendar View --- */
        .calendar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 5px;
            text-align: center;
        }

        .day-label { font-weight: bold; font-size: 0.8rem; opacity: 0.7; }

        .day-cell {
            aspect-ratio: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            font-size: 0.8rem;
            background: var(--bg-color);
            position: relative;
        }

        .today { border: 2px solid var(--primary); }
        .day-emoji { font-size: 1rem; margin-top: 2px; }

        /* --- Stats Section --- */
        .stats-grid { display: flex; flex-direction: column; gap: 10px; margin-top: 15px; }
        
        .bar-container {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .bar-label { width: 60px; font-size: 0.8rem; }
        .bar-bg { flex-grow: 1; height: 12px; background: var(--bg-color); border-radius: 6px; overflow: hidden; }
        .bar-fill { height: 100%; background: var(--primary); width: 0%; transition: width 0.5s ease; }

        /* --- History Section --- */
        .history-list { max-height: 400px; overflow-y: auto; }
        .history-item {
            display: flex;
            justify-content: space-between;
            padding: 12px;
            background: var(--bg-color);
            border-radius: 12px;
            margin-bottom: 10px;
        }

        .del-btn { background: none; border: none; color: #ff7e7e; cursor: pointer; }

        /* --- Theme Toggle --- */
        .nav-header {
            grid-column: 1 / -1;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .toggle-btn {
            background: var(--card-bg);
            border: 1px solid var(--primary);
            padding: 5px 15px;
            border-radius: 20px;
            cursor: pointer;
            color: var(--text-main);
        }
    </style>
</head>
<body>

    <div class="app-container">
        <header class="nav-header">
            <h1>Daily Mood Tracker</h1>
            <button class="toggle-btn" onclick="toggleTheme()">🌓 Theme Mode</button>
        </header>

        <!-- Left Column: Input and Calendar -->
        <div class="left-col">
            <div class="card">
                <h2>How are you?</h2>
                <div class="mood-grid">
                    <button class="mood-btn" onclick="selectMood('😊', 'Happy')">😊</button>
                    <button class="mood-btn" onclick="selectMood('😐', 'Neutral')">😐</button>
                    <button class="mood-btn" onclick="selectMood('😢', 'Sad')">😢</button>
                    <button class="mood-btn" onclick="selectMood('😡', 'Angry')">😡</button>
                </div>
                <textarea id="noteInput" placeholder="Why do you feel this way?"></textarea>
                <button class="save-btn" onclick="saveEntry()">Save Mood</button>
            </div>

            <div class="card">
                <div class="calendar-header">
                    <button onclick="changeMonth(-1)">◀</button>
                    <h3 id="currentMonthYear">Month Year</h3>
                    <button onclick="changeMonth(1)">▶</button>
                </div>
                <div class="calendar-grid" id="calendarGrid">
                    <!-- JS generated -->
                </div>
            </div>
        </div>

        <!-- Right Column: Stats and History -->
        <div class="right-col">
            <div class="card">
                <h2>Stats</h2>
                <div id="statsSummary" style="font-size: 0.9rem; margin-bottom: 15px;"></div>
                <div class="stats-grid" id="barCharts">
                    <!-- JS generated bars -->
                </div>
            </div>

            <div class="card">
                <h2>History</h2>
                <div class="history-list" id="historyList">
                    <!-- JS generated list -->
                </div>
            </div>
        </div>
    </div>

    <script>
        let selectedEmoji = "";
        let selectedLabel = "";
        let currentDate = new Date();
        let entries = JSON.parse(localStorage.getItem('moodEntries')) || [];

        const moodMap = { 'Happy': '😊', 'Neutral': '😐', 'Sad': '😢', 'Angry': '😡' };

        function selectMood(emoji, label) {
            selectedEmoji = emoji;
            selectedLabel = label;
            document.querySelectorAll('.mood-btn').forEach(btn => {
                btn.classList.toggle('selected', btn.innerText === emoji);
            });
        }

        function saveEntry() {
            if (!selectedEmoji) return alert("Select a mood!");
            
            const note = document.getElementById('noteInput').value;
            const now = new Date();
            const entry = {
                id: Date.now(),
                emoji: selectedEmoji,
                label: selectedLabel,
                note: note,
                date: now.toISOString(),
                dayKey: `${now.getFullYear()}-${now.getMonth()}-${now.getDate()}`
            };

            entries.unshift(entry);
            localStorage.setItem('moodEntries', JSON.stringify(entries));
            
            // Reset
            document.getElementById('noteInput').value = "";
            selectedEmoji = "";
            document.querySelectorAll('.mood-btn').forEach(b => b.classList.remove('selected'));
            
            refreshUI();
        }

        function deleteEntry(id) {
            entries = entries.filter(e => e.id !== id);
            localStorage.setItem('moodEntries', JSON.stringify(entries));
            refreshUI();
        }

        function refreshUI() {
            renderCalendar();
            renderHistory();
            renderStats();
        }

        // --- Calendar Logic ---
        function renderCalendar() {
            const grid = document.getElementById('calendarGrid');
            const header = document.getElementById('currentMonthYear');
            grid.innerHTML = "";
            
            const monthNames = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];
            header.innerText = `${monthNames[currentDate.getMonth()]} ${currentDate.getFullYear()}`;

            ["S", "M", "T", "W", "T", "F", "S"].forEach(day => {
                grid.innerHTML += `<div class="day-label">${day}</div>`;
            });

            const firstDay = new Date(currentDate.getFullYear(), currentDate.getMonth(), 1).getDay();
            const daysInMonth = new Date(currentDate.getFullYear(), currentDate.getMonth() + 1, 0).getDate();

            // Fill empty cells
            for (let i = 0; i < firstDay; i++) grid.innerHTML += `<div></div>`;

            // Fill actual days
            for (let d = 1; d <= daysInMonth; d++) {
                const dayKey = `${currentDate.getFullYear()}-${currentDate.getMonth()}-${d}`;
                const entry = entries.find(e => e.dayKey === dayKey);
                const isToday = new Date().toDateString() === new Date(currentDate.getFullYear(), currentDate.getMonth(), d).toDateString();
                
                grid.innerHTML += `
                    <div class="day-cell ${isToday ? 'today' : ''}">
                        ${d}
                        <div class="day-emoji">${entry ? entry.emoji : ''}</div>
                    </div>
                `;
            }
        }

        function changeMonth(step) {
            currentDate.setMonth(currentDate.getMonth() + step);
            renderCalendar();
        }

        // --- History Logic ---
        function renderHistory() {
            const container = document.getElementById('historyList');
            container.innerHTML = entries.map(e => `
                <div class="history-item">
                    <div>
                        <strong>${e.emoji} ${new Date(e.date).toLocaleDateString()}</strong><br>
                        <small>${e.note}</small>
                    </div>
                    <button class="del-btn" onclick="deleteEntry(${e.id})">🗑️</button>
                </div>
            `).join('');
        }

        // --- Stats Logic ---
        function renderStats() {
            const counts = { 'Happy': 0, 'Neutral': 0, 'Sad': 0, 'Angry': 0 };
            entries.forEach(e => counts[e.label]++);
            
            const total = entries.length;
            const barContainer = document.getElementById('barCharts');
            barContainer.innerHTML = "";

            Object.keys(counts).forEach(label => {
                const pct = total === 0 ? 0 : (counts[label] / total) * 100;
                barContainer.innerHTML += `
                    <div class="bar-container">
                        <span class="bar-label">${label}</span>
                        <div class="bar-bg"><div class="bar-fill" style="width: ${pct}%"></div></div>
                        <span style="font-size: 0.7rem">${counts[label]}</span>
                    </div>
                `;
            });

            const summary = document.getElementById('statsSummary');
            const mostFrequent = Object.keys(counts).reduce((a, b) => counts[a] > counts[b] ? a : b);
            summary.innerHTML = total > 0 ? `Most frequent mood: <strong>${mostFrequent}</strong>` : "No data yet.";
        }

        function toggleTheme() {
            const body = document.body;
            const theme = body.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
            body.setAttribute('data-theme', theme);
        }

        // Init
        refreshUI();
    </script>
</body>
</html>
