<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Mood Tracker</title>
    <style>
        :root {
            --bg-color: #f0f2f5;
            --container-bg: #ffffff;
            --text-color: #333;
            --border-color: #e0e0e0;
            --primary-btn: #6c5ce7;
            --happy-color: #fff9db;
            --neutral-color: #e7f5ff;
            --sad-color: #e3f2fd;
            --angry-color: #fff5f5;
            --shadow: 0 8px 30px rgba(0,0,0,0.05);
        }

        [data-theme="dark"] {
            --bg-color: #1a1a2e;
            --container-bg: #16213e;
            --text-color: #e0e0e0;
            --border-color: #2d3748;
            --shadow: 0 8px 30px rgba(0,0,0,0.3);
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            display: flex;
            justify-content: center;
            padding: 40px 20px;
            transition: background 0.4s ease;
        }

        .main-container {
            width: 100%;
            max-width: 500px;
            background: var(--container-bg);
            padding: 30px;
            border-radius: 24px;
            box-shadow: var(--shadow);
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        h1 { font-size: 1.5rem; margin: 0; color: var(--primary-btn); }

        /* Statistics Section */
        .stats-bar {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
            font-size: 0.85rem;
            background: var(--bg-color);
            padding: 12px;
            border-radius: 12px;
        }

        /* Mood Selection */
        .mood-options {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }

        .mood-btn {
            background: var(--bg-color);
            border: 2px solid transparent;
            border-radius: 15px;
            padding: 15px 5px;
            font-size: 1.5rem;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }

        .mood-btn span { font-size: 0.7rem; font-weight: bold; }
        
        .mood-btn:hover { transform: translateY(-3px); }

        .mood-btn.selected {
            border-color: var(--primary-btn);
            background: var(--container-bg);
            box-shadow: 0 4px 12px rgba(108, 92, 231, 0.2);
        }

        /* Input area */
        textarea {
            width: 100%;
            height: 80px;
            padding: 15px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            background: var(--bg-color);
            color: var(--text-color);
            resize: none;
            box-sizing: border-box;
            font-family: inherit;
            margin-bottom: 15px;
        }

        .save-btn {
            width: 100%;
            padding: 12px;
            border-radius: 12px;
            border: none;
            background: var(--primary-btn);
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .save-btn:hover { opacity: 0.9; }

        /* History List */
        .history-section { margin-top: 35px; }
        .history-section h2 { font-size: 1.1rem; margin-bottom: 15px; }

        .entry-card {
            background: var(--bg-color);
            padding: 15px;
            border-radius: 15px;
            margin-bottom: 12px;
            position: relative;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .entry-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 8px;
        }

        .entry-date { font-size: 0.75rem; opacity: 0.6; }
        .entry-emoji { font-size: 1.2rem; }
        .entry-note { font-size: 0.9rem; line-height: 1.4; }

        .del-btn {
            background: none;
            border: none;
            color: #ff7675;
            cursor: pointer;
            font-size: 0.8rem;
            padding: 0;
            margin-left: 10px;
        }

        .theme-toggle {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 1.2rem;
        }
    </style>
</head>
<body>

    <div class="main-container">
        <header>
            <h1>Daily Mood Tracker</h1>
            <button class="theme-toggle" onclick="toggleTheme()" title="Toggle Dark Mode">🌓</button>
        </header>

        <div class="stats-bar">
            <div>Entries: <strong id="totalEntries">0</strong></div>
            <div>Common: <strong id="commonMood">-</strong></div>
        </div>

        <div class="mood-options">
            <button class="mood-btn" onclick="selectMood(this, 'Happy', '😊', '#fff9db')">
                😊 <span>Happy</span>
            </button>
            <button class="mood-btn" onclick="selectMood(this, 'Neutral', '😐', '#e7f5ff')">
                😐 <span>Neutral</span>
            </button>
            <button class="mood-btn" onclick="selectMood(this, 'Sad', '😢', '#e3f2fd')">
                😢 <span>Sad</span>
            </button>
            <button class="mood-btn" onclick="selectMood(this, 'Angry', '😡', '#fff5f5')">
                😡 <span>Angry</span>
            </button>
        </div>

        <textarea id="noteInput" placeholder="Why do you feel this way? (Optional)"></textarea>
        
        <button class="save-btn" onclick="saveEntry()">Save Mood</button>

        <div class="history-section">
            <h2>History</h2>
            <div id="historyList"></div>
        </div>
    </div>

    <script>
        let selectedMoodData = null;
        let entries = JSON.parse(localStorage.getItem('moodEntries')) || [];

        // Initialize display
        updateDisplay();

        function selectMood(element, label, emoji, color) {
            // Remove selection from others
            document.querySelectorAll('.mood-btn').forEach(btn => btn.classList.remove('selected'));
            
            // Highlight current
            element.classList.add('selected');
            
            selectedMoodData = { label, emoji };
            
            // Extra: Subtle background change based on mood
            document.body.style.backgroundColor = color;
            
            // If dark mode is on, we don't want the full bright color
            if(document.body.getAttribute('data-theme') === 'dark') {
                document.body.style.backgroundColor = "#1a1a2e";
            }
        }

        function saveEntry() {
            if (!selectedMoodData) {
                alert("Please select a mood first!");
                return;
            }

            const note = document.getElementById('noteInput').value;
            const date = new Date().toLocaleString([], { 
                weekday: 'short', month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' 
            });

            const newEntry = {
                id: Date.now(),
                mood: selectedMoodData.label,
                emoji: selectedMoodData.emoji,
                note: note,
                date: date
            };

            entries.unshift(newEntry);
            localStorage.setItem('moodEntries', JSON.stringify(entries));
            
            // Reset UI
            document.getElementById('noteInput').value = "";
            document.querySelectorAll('.mood-btn').forEach(btn => btn.classList.remove('selected'));
            selectedMoodData = null;
            document.body.style.backgroundColor = "";
            
            updateDisplay();
        }

        function updateDisplay() {
            const list = document.getElementById('historyList');
            list.innerHTML = "";

            entries.forEach(entry => {
                const div = document.createElement('div');
                div.className = 'entry-card';
                div.innerHTML = `
                    <div class="entry-header">
                        <span class="entry-emoji">${entry.emoji} <strong>${entry.mood}</strong></span>
                        <div>
                            <span class="entry-date">${entry.date}</span>
                            <button class="del-btn" onclick="deleteEntry(${entry.id})">Delete</button>
                        </div>
                    </div>
                    <div class="entry-note">${entry.note || 'No note added.'}</div>
                `;
                list.appendChild(div);
            });

            updateStats();
        }

        function deleteEntry(id) {
            entries = entries.filter(e => e.id !== id);
            localStorage.setItem('moodEntries', JSON.stringify(entries));
            updateDisplay();
        }

        function updateStats() {
            document.getElementById('totalEntries').innerText = entries.length;
            
            if (entries.length === 0) {
                document.getElementById('commonMood').innerText = "-";
                return;
            }

            const counts = {};
            entries.forEach(e => counts[e.mood] = (counts[e.mood] || 0) + 1);
            const mostCommon = Object.keys(counts).reduce((a, b) => counts[a] > counts[b] ? a : b);
            document.getElementById('commonMood').innerText = mostCommon;
        }

        function toggleTheme() {
            const body = document.body;
            const isDark = body.getAttribute('data-theme') === 'dark';
            body.setAttribute('data-theme', isDark ? 'light' : 'dark');
            body.style.backgroundColor = ""; // Reset mood color transitions
        }
    </script>
</body>
</html>
