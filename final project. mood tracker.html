<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Mood Tracker</title>
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            --card-bg: #ffffff;
            --text-main: #333;
            --primary: #4a90e2;
            --border: #ddd;
            --shadow: 0 4px 15px rgba(0,0,0,0.1);
            
            /* Mood Colors */
            --happy: #ffeb3b;
            --excited: #ff9800;
            --calm: #8bc34a;
            --neutral: #9e9e9e;
            --tired: #795548;
            --anxious: #9c27b0;
            --sad: #2196f3;
            --angry: #f44336;
        }

        body.dark {
            --bg-gradient: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            --card-bg: #1f1f2e;
            --text-main: #e0e0e0;
            --border: #444;
            --shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }

        body {
            margin: 0;
            padding: 20px;
            background: var(--bg-gradient);
            color: var(--text-main);
            min-height: 100vh;
            transition: background 0.3s;
        }

        .container { max-width: 1000px; margin: 0 auto; }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .card {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: var(--shadow);
        }

        /* Mood Input */
        .mood-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(80px, 1fr));
            gap: 10px;
            margin-bottom: 15px;
        }

        .mood-btn {
            border: 2px solid transparent;
            background: #f0f0f0;
            border-radius: 8px;
            padding: 10px;
            cursor: pointer;
            text-align: center;
            transition: 0.2s;
        }

        .mood-btn:hover { transform: translateY(-2px); }
        .mood-btn.selected { border-color: var(--primary); background: #e3f2fd; }
        .mood-btn span { display: block; font-size: 1.5rem; }

        .input-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input, textarea {
            width: 100%;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid var(--border);
            background: inherit;
            color: inherit;
        }

        button.primary-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 6px;
            cursor: pointer;
            width: 100%;
            font-size: 1rem;
        }

        /* Calendar */
        .cal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .cal-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 5px;
        }

        .cal-day-label { text-align: center; font-weight: bold; padding: 5px; }
        .cal-cell {
            min-height: 80px;
            border: 1px solid var(--border);
            padding: 5px;
            border-radius: 4px;
            cursor: pointer;
            position: relative;
        }

        .cal-cell:hover { background: rgba(0,0,0,0.05); }
        .cal-cell.today { border: 2px solid var(--primary); }
        .cal-cell.has-entry { background: rgba(74, 144, 226, 0.1); }
        .cal-cell .day-num { font-size: 0.8rem; font-weight: bold; }
        .cal-moods { display: flex; flex-wrap: wrap; gap: 2px; margin-top: 5px; }

        /* Stats & History */
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; }
        .stat-item { padding: 15px; border: 1px solid var(--border); border-radius: 8px; text-align: center; }
        .stat-val { font-size: 1.5rem; font-weight: bold; color: var(--primary); }

        .chart-container { height: 150px; display: flex; align-items: flex-end; gap: 10px; margin-top: 20px; border-bottom: 2px solid var(--border); }
        .chart-bar { flex: 1; background: var(--primary); border-radius: 4px 4px 0 0; position: relative; min-width: 20px; }
        .chart-label { position: absolute; bottom: -25px; left: 50%; transform: translateX(-50%); font-size: 0.7rem; }

        .history-item {
            display: flex;
            align-items: center;
            padding: 10px;
            border-bottom: 1px solid var(--border);
            gap: 15px;
        }
        .history-item:last-child { border: none; }
        .del-btn { color: var(--angry); cursor: pointer; border: none; background: none; font-size: 1.2rem; }

        .dark-toggle { cursor: pointer; font-size: 1.5rem; background: none; border: none; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Daily Mood Tracker</h1>
        <button class="dark-toggle" onclick="toggleDarkMode()">🌓</button>
    </header>

    <div class="card">
        <h3>How are you feeling?</h3>
        <div class="mood-grid" id="moodGrid">
            <!-- Mood buttons injected by JS -->
        </div>
        <div class="input-group">
            <label>Date</label>
            <input type="date" id="entryDate">
        </div>
        <div class="input-group">
            <label>Note</label>
            <textarea id="entryNote" placeholder="What's on your mind?"></textarea>
        </div>
        <button class="primary-btn" onclick="saveEntry()">Save Mood</button>
    </div>

    <div class="card">
        <div class="cal-header">
            <button onclick="changeMonth(-1)">❮ Prev</button>
            <h3 id="currentMonthLabel">Month Year</h3>
            <button onclick="changeMonth(1)">Next ❯</button>
        </div>
        <div class="cal-grid" id="calendarGrid"></div>
    </div>

    <div class="card">
        <h3>Statistics (Current View)</h3>
        <div id="statsContent"></div>
        <div class="chart-container" id="moodChart"></div>
        <div id="insights" style="margin-top: 30px; font-style: italic; color: var(--primary);"></div>
    </div>

    <div class="card">
        <h3>Mood History</h3>
        <div id="historyList"></div>
    </div>
</div>

<script>
    // --- DATA & STATE ---
    const MOOD_DATA = {
        happy: { emoji: '😊', score: 2, color: 'var(--happy)' },
        excited: { emoji: '🤩', score: 2, color: 'var(--excited)' },
        calm: { emoji: '😌', score: 1, color: 'var(--calm)' },
        neutral: { emoji: '😐', score: 0, color: 'var(--neutral)' },
        tired: { emoji: '😴', score: -1, color: 'var(--tired)' },
        anxious: { emoji: '😰', score: -1, color: 'var(--anxious)' },
        sad: { emoji: '😢', score: -2, color: 'var(--sad)' },
        angry: { emoji: '😠', score: -2, color: 'var(--angry)' }
    };

    let entries = JSON.parse(localStorage.getItem('moodEntries')) || [];
    let selectedMood = null;
    let viewDate = new Date(); // Controls the calendar view

    // --- INITIALIZATION ---
    window.onload = () => {
        document.getElementById('entryDate').valueAsDate = new Date();
        renderMoodButtons();
        renderAll();
    };

    function toggleDarkMode() {
        document.body.classList.toggle('dark');
    }

    function renderMoodButtons() {
        const grid = document.getElementById('moodGrid');
        grid.innerHTML = Object.keys(MOOD_DATA).map(key => `
            <button class="mood-btn" onclick="selectMood('${key}')" id="btn-${key}">
                <span>${MOOD_DATA[key].emoji}</span>
                <small>${key}</small>
            </button>
        `).join('');
    }

    function selectMood(key) {
        selectedMood = key;
        document.querySelectorAll('.mood-btn').forEach(b => b.classList.remove('selected'));
        document.getElementById(`btn-${key}`).classList.add('selected');
    }

    // --- LOGIC ---
    function saveEntry() {
        const dateInput = document.getElementById('entryDate').value;
        const noteInput = document.getElementById('entryNote').value;

        if (!selectedMood) return alert("Please select a mood!");

        const newEntry = {
            id: Date.now(),
            date: dateInput,
            mood: selectedMood,
            note: noteInput
        };

        entries.push(newEntry);
        localStorage.setItem('moodEntries', JSON.stringify(entries));
        
        // Reset
        selectedMood = null;
        document.getElementById('entryNote').value = '';
        renderAll();
    }

    function deleteEntry(id) {
        entries = entries.filter(e => e.id !== id);
        localStorage.setItem('moodEntries', JSON.stringify(entries));
        renderAll();
    }

    function changeMonth(dir) {
        viewDate.setMonth(viewDate.getMonth() + dir);
        renderAll();
    }

    // --- RENDERING ---
    function renderAll() {
        renderMoodButtons(); // resets selection
        renderCalendar();
        renderHistory();
        renderStats();
    }

    function renderCalendar() {
        const grid = document.getElementById('calendarGrid');
        const label = document.getElementById('currentMonthLabel');
        grid.innerHTML = '';

        const year = viewDate.getFullYear();
        const month = viewDate.getMonth();
        label.innerText = new Intl.DateTimeFormat('en-US', { month: 'long', year: 'numeric' }).format(viewDate);

        // Day labels
        ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'].forEach(d => {
            grid.innerHTML += `<div class="cal-day-label">${d}</div>`;
        });

        const firstDay = new Date(year, month, 1).getDay();
        const daysInMonth = new Date(year, month + 1, 0).getDate();

        // Empty cells
        for (let i = 0; i < firstDay; i++) grid.innerHTML += `<div></div>`;

        // Day cells
        for (let day = 1; day <= daysInMonth; day++) {
            const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
            const dayEntries = entries.filter(e => e.date === dateStr);
            const isToday = new Date().toISOString().split('T')[0] === dateStr;

            const cell = document.createElement('div');
            cell.className = `cal-cell ${isToday ? 'today' : ''} ${dayEntries.length ? 'has-entry' : ''}`;
            cell.innerHTML = `
                <div class="day-num">${day}</div>
                <div class="cal-moods">${dayEntries.map(e => MOOD_DATA[e.mood].emoji).join('')}</div>
            `;
            cell.onclick = () => {
                document.getElementById('entryDate').value = dateStr;
                window.scrollTo({ top: 0, behavior: 'smooth' });
            };
            grid.appendChild(cell);
        }
    }

    function renderHistory() {
        const list = document.getElementById('historyList');
        const sorted = [...entries].sort((a, b) => b.id - a.id);

        list.innerHTML = sorted.map(e => `
            <div class="history-item">
                <div style="min-width: 100px"><strong>${e.date}</strong></div>
                <div style="font-size: 1.5rem">${MOOD_DATA[e.mood].emoji}</div>
                <div style="flex-grow: 1">${e.note || '<small>No note</small>'}</div>
                <button class="del-btn" onclick="deleteEntry(${e.id})">🗑</button>
            </div>
        `).join('') || '<p>No entries yet.</p>';
    }

    function renderStats() {
        const year = viewDate.getFullYear();
        const month = viewDate.getMonth();
        const monthPrefix = `${year}-${String(month + 1).padStart(2, '0')}`;
        const monthEntries = entries.filter(e => e.date.startsWith(monthPrefix));

        const statsDiv = document.getElementById('statsContent');
        const chartDiv = document.getElementById('moodChart');
        const insightDiv = document.getElementById('insights');

        if (monthEntries.length === 0) {
            statsDiv.innerHTML = "No data for this month.";
            chartDiv.innerHTML = "";
            insightDiv.innerHTML = "";
            return;
        }

        // Calculations
        const counts = {};
        let totalScore = 0;
        monthEntries.forEach(e => {
            counts[e.mood] = (counts[e.mood] || 0) + 1;
            totalScore += MOOD_DATA[e.mood].score;
        });

        const avgScore = totalScore / monthEntries.length;
        const topMood = Object.keys(counts).reduce((a, b) => counts[a] > counts[b] ? a : b);

        // Trend logic (Split month in half)
        const midPoint = 15;
        const firstHalf = monthEntries.filter(e => parseInt(e.date.split('-')[2]) <= midPoint);
        const secondHalf = monthEntries.filter(e => parseInt(e.date.split('-')[2]) > midPoint);
        
        const getAvg = (arr) => arr.length ? arr.reduce((s, e) => s + MOOD_DATA[e.mood].score, 0) / arr.length : 0;
        const trendVal = getAvg(secondHalf) - getAvg(firstHalf);
        const trendLabel = trendVal > 0.1 ? "Improving 📈" : trendVal < -0.1 ? "Declining 📉" : "Stable ➡️";

        // Best Week / Worst Week
        const weeks = {};
        monthEntries.forEach(e => {
            const d = new Date(e.date);
            const weekNum = Math.ceil((d.getDate() + new Date(year, month, 1).getDay()) / 7);
            if (!weeks[weekNum]) weeks[weekNum] = [];
            weeks[weekNum].push(MOOD_DATA[e.mood].score);
        });

        let bestWeek = -1, worstWeek = -1, maxW = -Infinity, minW = Infinity;
        Object.keys(weeks).forEach(w => {
            const avg = weeks[w].reduce((a, b) => a + b, 0) / weeks[w].length;
            if (avg > maxW) { maxW = avg; bestWeek = w; }
            if (avg < minW) { minW = avg; worstWeek = w; }
        });

        statsDiv.innerHTML = `
            <div class="stats-grid">
                <div class="stat-item"><div class="stat-val">${monthEntries.length}</div>Total Entries</div>
                <div class="stat-item"><div class="stat-val">${avgScore.toFixed(1)}</div>Avg Score</div>
                <div class="stat-item"><div class="stat-val">${MOOD_DATA[topMood].emoji}</div>Most Frequent</div>
                <div class="stat-item"><div class="stat-val">${trendLabel}</div>Monthly Trend</div>
            </div>
            <p style="margin-top:15px">Best Week: ${bestWeek} | Worst Week: ${worstWeek}</p>
        `;

        // Bar Chart (Distribution)
        const maxCount = Math.max(...Object.values(counts));
        chartDiv.innerHTML = Object.keys(MOOD_DATA).map(m => {
            const h = ((counts[m] || 0) / maxCount) * 100;
            return `<div class="chart-bar" style="height: ${h}%; background: ${MOOD_DATA[m].color}">
                        <span class="chart-label">${MOOD_DATA[m].emoji}</span>
                    </div>`;
        }).join('');

        // Smart Insights
        let insightMsg = "";
        const weekendMoods = monthEntries.filter(e => [0, 6].includes(new Date(e.date).getDay()));
        const weekdayMoods = monthEntries.filter(e => ![0, 6].includes(new Date(e.date).getDay()));
        
        if (getAvg(weekendMoods) > getAvg(weekdayMoods)) insightMsg = "💡 You feel significantly better on weekends!";
        else if (monthEntries.length > 5) insightMsg = "💡 Consistent tracking! Keep it up to see deeper patterns.";
        
        insightDiv.innerText = insightMsg;
    }
</script>

</body>
</html>
